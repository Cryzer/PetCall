name: Release WoW Addon

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Extract version from tag (v1.2.3 -> 1.2.3)
      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      # Update .toc version automatically
      - name: Update TOC version
        run: |
          sed -i "s/^## Version:.*/## Version: ${{ steps.version.outputs.VERSION }}/" PetCall.toc || true

      # Prepare addon folder
      - name: Package addon
        run: |
          mkdir build
          rsync -av \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'build' \
            --exclude '.gitignore' \
            --exclude '.pkgmeta' \
            --exclude 'README.md' \
            --exclude 'CHANGES.md' \
            ./ PetCall/
          zip -r build/PetCall.zip PetCall
          
      - name: Extract changelog for version
        id: changelog
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          
          awk -v ver="$VERSION" '
            $0 ~ "^v"ver" " {flag=1}
            flag && $0 ~ "^v[0-9]" && $0 !~ "^v"ver" " {exit}
            flag {print}
          ' CHANGES.md > RELEASE_NOTES.md

          echo "notes<<EOF" >> $GITHUB_OUTPUT
          cat RELEASE_NOTES.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
    
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.notes }}
          files: build/PetCall.zip
