name: Release WoW Addon

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create zip
        run: |
          mkdir build
          mkdir -p package/PetCall
          rsync -av --exclude '.git' --exclude '.github' ./ package/PetCall/
          zip -r build/PetCall.zip package/PetCall

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/PetCall.zip
          generate_release_notes: true
