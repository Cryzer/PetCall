name: Release WoW Addon

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Extract version from tag (v1.2.3 -> 1.2.3)
      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      # Update .toc version automatically
      - name: Update TOC version
        run: |
          sed -i "s/^## Version:.*/## Version: ${{ steps.version.outputs.VERSION }}/" PetCall.toc || true

      # Prepare addon folder
      - name: Package addon
        run: |
          mkdir build
          rsync -av \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'build' \
            ./ PetCall/
          zip -r build/PetCall.zip PetCall

      # Create GitHub Release
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: build/PetCall.zip
          generate_release_notes: true
